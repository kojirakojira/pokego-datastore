services:
  postgres:
    image: postgres:17.2-alpine
    ports:
      - 5432:5432
#    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    volumes:
      - dbdata:/var/lib/postgresql/data
      - ./docker-local/postgres/init:/docker-entrypoint-initdb.d
#      - ./docker-local/postgres/postgresql.conf:/etc/postgresql/postgresql.conf
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: POKEMON
      TZ: "Asia/Tokyo"
    restart: always

  redis:
    image: redis:7.0.15-alpine3.20
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: always

volumes:
  dbdata:
    driver: local
    driver_opts:
      type: none
      device: ./docker-local/volumes/postgres
      o: bind

  redisdata:
    driver: local
    driver_opts:
      type: none
      device: ./docker-local/volumes/redis
      o: bind
